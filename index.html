<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollow Knight - El Video</title>
    <!-- Vinculamos el archivo CSS externo -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- COMENTARIO SOBRE IMÁGENES:
         Para este diseño, el personaje principal está integrado directamente desde la imagen que proporcionaste (image_0.png).
         He añadido una imagen de fondo sutil que puedes crear fácilmente o descargar
         (p.ej., un patrón de cueva oscura o runas antiguas).
         Si quisieras otra imagen decorativa, como un pequeño icono de un Grub,
         podrías ponerlo en una carpeta 'iconos' y referenciarlo así:
         <img src="iconos/grub.png" alt="Icono Grub" class="mini-icon">
    -->
</head>
<body>

<div class="page-container">
    
    <!-- Sección de cabecera con el personaje y el título -->
    <header>
        <img src="imagen/hollow.webp" alt="El Caballero Hollow" class="main-character-img">
        <h1 class="elegant-title">HOLLOW KNIGHT</h1>
    </header>

    <!-- Sección del video centrada -->
    <main class="video-section">
        <video controls class="centered-video">
            <!-- REEMPLAZA ESTA RUTA POR TU PROPIO VIDEO -->
            <!-- Asegúrate de tener una carpeta 'videos' y tu video dentro -->
            <source src="videos/tu-video-aqui.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de video.
        </video>
    </main>

</div>

</body>
</html>
